<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>View Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Admin Dashboard</span>
            <div class="d-flex gap-2">
                <a href="viewempdetails.html" class="btn btn-secondary btn-sm">← Back</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-4">Employee Details</h4>

        <table class="table table-bordered">
            <tr>
                <th>ID</th>
                <td id="emp_id"></td>
            </tr>
            <tr>
                <th>Name</th>
                <td id="emp_name"></td>
            </tr>
            <tr>
                <th>Email</th>
                <td id="emp_email"></td>
            </tr>
            <tr>
                <th>Phone</th>
                <td id="emp_phone"></td>
            </tr>
            <tr>
                <th>Department</th>
                <td id="emp_department"></td>
            </tr>
            <tr>
                <th>Designation</th>
                <td id="emp_designation"></td>
            </tr>
            <tr>
                <th>Address</th>
                <td id="emp_address"></td>
            </tr>
        </table>


        <div class="mt-3">
            <button class="btn btn-warning" id="editBtn">Edit</button>
            <button class="btn btn-danger" id="deleteBtn">Delete</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        console.log("ID:", id);
        console.log("Token:", token);

        if (!id || !token) {
            alert("Invalid session or employee ID missing");
            window.location.href = "viewempdetails.html";
        }

        // 🔹 LOAD EMPLOYEE DETAILS
        fetch(`http://127.0.0.1:8000/api/admin/employees/${id}/`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => {
                if (!res.ok) throw new Error("Failed to load employee");
                return res.json();
            })
            .then(emp => {
                document.getElementById("emp_id").innerText = emp.id;
                document.getElementById("emp_name").innerText = emp.first_name + " " + emp.last_name;
                document.getElementById("emp_email").innerText = emp.email;
                document.getElementById("emp_phone").innerText = emp.phone;
                document.getElementById("emp_department").innerText = emp.department;
                document.getElementById("emp_designation").innerText = emp.designation;
                document.getElementById("emp_address").innerText = emp.address;
            })
            .catch(() => {
                alert("Unable to load employee");
                window.location.href = "viewempdetails.html";
            });

        // 🔹 EDIT BUTTON
        document.getElementById("editBtn").addEventListener("click", () => {
            window.location.href = `editemp.html?id=${id}`;
        });

        // 🔹 DELETE BUTTON
        document.getElementById("deleteBtn").addEventListener("click", () => {
            if (!confirm("Are you sure you want to delete this employee?")) return;

            fetch(`http://127.0.0.1:8000/api/admin/employees/${id}/`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })
                .then(res => {
                    if (res.status === 204) {
                        alert("Employee deleted successfully");
                        window.location.href = "viewempdetails.html";
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    alert("Failed to delete employee");
                });
        });

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>


</body>

</html>
