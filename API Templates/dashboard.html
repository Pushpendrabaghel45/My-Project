<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
        }

        /* Grey Sidebar */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background-color: #6c757d;
            /* Bootstrap grey */
        }

        .sidebar .nav-link {
            color: #f8f9fa;
            margin-bottom: 5px;
        }

        .sidebar .nav-link:hover {
            background-color: #5a6268;
            color: #ffffff;
        }

        .sidebar .nav-link.active {
            background-color: #495057;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Admin Dashboard</span>
            <a href="#" class="btn btn-danger btn-sm" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="d-flex">

        <!-- Sidebar -->
        <div class="sidebar bg-dark p-3">
            <!-- <h6 class="text-light mb-3">MENU</h6> -->
            <ul class="nav nav-pills flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="viewempdetails.html">View Employees</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="createemp.html">Create Employees</a>
                </li>

            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4 bg-light">

            <div class="container mt-4">

                <!-- Welcome Card -->
                <div class="card mb-4 shadow">
                    <div class="card-body">
                        <h4 id="welcomeText">Welcome</h4>
                        <p id="roleText"></p>

                    </div>
                </div>



                <!-- Dashboard Cards -->
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-bg-primary mb-3 shadow">
                            <div class="card-body">
                                <h5 class="card-title">Profile</h5>
                                <p class="card-text">View & update your profile</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card text-bg-success mb-3 shadow">
                            <div class="card-body">
                                <h5 class="card-title">Attendance</h5>
                                <p class="card-text">Check attendance records</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card text-bg-warning mb-3 shadow">
                            <div class="card-body">
                                <h5 class="card-title">Tasks</h5>
                                <p class="card-text">View assigned tasks</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        const accessToken = localStorage.getItem("token");
        console.log(accessToken);

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
