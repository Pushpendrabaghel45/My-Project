<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin Panel - Edit Employee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      min-height: 100vh;
    }

    /* Grey Sidebar */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background-color: #6c757d;
      /* Bootstrap grey */
    }

    .sidebar .nav-link {
      color: #f8f9fa;
      margin-bottom: 5px;
    }

    .sidebar .nav-link:hover {
      background-color: #5a6268;
      color: #ffffff;
    }

    .sidebar .nav-link.active {
      background-color: #495057;
      color: #ffffff;
    }
  </style>
</head>

<body>
  <!-- Top Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">Admin Dashboard</span>
      <a href="#" class="btn btn-danger btn-sm" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark p-3">
      <!-- <h6 class="text-light mb-3">MENU</h6> -->
      <ul class="nav nav-pills flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="dashboard.html">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="createemp.html">Create Employees</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="viewempdetails.html">View Employees</a>
        </li>

      </ul>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">Edit Profile</h5>
            </div>

            <div class="card-body">
              <form method="post" id="createemp">
                <div class="row mb-3">
                  <div class="col-md-6">


                    <label class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" value="John" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" value="Doe" />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" value="john.doe@example.com" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" id="phone" class="form-control" value="+1 234 567 890" />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <input type="text" id="department" class="form-control" value="IT" readonly />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <input type="text" id="designation" class="form-control" value="Software Engineer" readonly />
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Address</label>
                  <textarea class="form-control" id="address" rows="3">
123 Main Street</textarea>
                </div>

                <!-- <div class="mb-3">
                  <label class="form-label">Profile Photo</label>
                  <input type="file" class="form-control" />
                </div> -->

                <div class="d-flex justify-content-end">
                  <button type="reset" class="btn btn-secondary me-2">
                    Cancel
                  </button>
                  <button type="submit" class="btn btn-primary">
                    Update Profile
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


<script>
document.getElementById("createemp").addEventListener("submit", async function(e) {
    e.preventDefault();

    const accessToken = localStorage.getItem("token");

    if (!accessToken) {
        alert("Session expired. Please login again.");
        window.location.href = "login.html";
        return;
    }

    // Prepare employee data
    const employeeData = {
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        designation: document.getElementById("designation").value,
        address: document.getElementById("address").value
    };

    try {
        const response = await fetch("http://127.0.0.1:8000/api/admin/create-employee/", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${accessToken}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(employeeData)
        });

        const data = await response.json();

        if (!response.ok) {
            // Show server error or unauthorized
            alert(data.detail || data.error || "Unauthorized or invalid data");
            if (response.status === 401) {
                localStorage.clear();
                window.location.href = "login.html";
            }
            return;
        }

        alert("Employee created successfully!");
        console.log("Employee created:", data);

        // Optionally, reset form
        document.getElementById("createemp").reset();

    } catch (err) {
        console.error("Fetch error:", err);
        alert("Server error. Please try again.");
    }
});

// Logout function
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>

</html>
