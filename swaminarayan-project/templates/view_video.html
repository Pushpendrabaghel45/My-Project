{% extends 'admin.html' %}
{% block title %}View Video{% endblock %}

{% block content %}
<h2>{{ video.title }}</h2>

<video width="480" controls
       poster="{{ url_for('thumbnail_file', filename=video.thumbnail) }}">
    <source src="{{ url_for('uploaded_file', filename=video.filename) }}"
            type="video/mp4">
    Your browser does not support the video tag.
</video>

<p class="mt-3">{{ video.description }}</p>
{% endblock %}
