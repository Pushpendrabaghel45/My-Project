<div class="row align-items-center mb-3">
    <div class="col-md-8">
        <h2>Manage Videos</h2>
    </div>
    <div class="col-md-4 text-end">
        <a href="{{ url_for('add_video') }}" class="btn btn-primary">
            <i class="fa fa-plus"></i> Add Video
        </a>
    </div>
</div>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Thumbnail</th>
        <th>Title</th>
        <th>Actions</th>
    </tr>

    {% for video in videos %}
    <tr>
        <td>{{ video.id }}</td>

        <td>
            <img src="{{ url_for('thumbnail_file', filename=video.thumbnail) }}" width="120" class="rounded">
        </td>

        <td>{{ video.title }}</td>

        <td>
            <a href="{{ url_for('view_video', id=video.id) }}" class="btn btn-info btn-sm">View</a>
            <a href="{{ url_for('edit_video', id=video.id) }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{{ url_for('delete_video', id=video.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this video?');">Delete</a>

    </tr>
    {% endfor %}
</table>


{% endblock %}
