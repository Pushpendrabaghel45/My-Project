{% extends "./admin_base.html" %}
{% block content %}
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">
            {% if product %}Edit{% else %}Add{% endif %} Product
          </h4>
        </div>

        <div class="card-body">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Product Name -->
            <div class="mb-3">
              <label class="form-label">Product Name</label>
              <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter product name"
                value="{{ product.name|default:'' }}"
                required
              >
            </div>

            <!-- Price -->
            <div class="mb-3">
              <label class="form-label">Price</label>
              <input
                type="number"
                name="price"
                class="form-control"
                placeholder="Enter price"
                value="{{ product.price|default:'' }}"
                required
              >
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea
                name="description"
                class="form-control"
                rows="3"
                placeholder="Product description"
              >{{ product.description|default:'' }}</textarea>
            </div>

            <!-- Image -->
            <div class="mb-3">
              <label class="form-label">Product Image</label>
              <input type="file" name="image" class="form-control">
              {% if product and product.image %}
                <small class="text-muted d-block mt-1">
                  Current image: {{ product.image.url }}
                </small>
              {% endif %}
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success w-100">
                {% if product %}Update{% else %}Save{% endif %}
              </button>
              <a href="{% url 'admin_products' %}" class="btn btn-secondary w-100">
                Cancel
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
