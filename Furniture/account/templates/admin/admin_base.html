{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Admin Panel{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 bg-dark min-vh-100 p-3">
      <h5 class="text-white text-center mb-4">FurniForma</h5>

      <ul class="nav nav-pills flex-column gap-2">

        <li class="nav-item">
          <a href="{% url 'admin_dashboard' %}"
             class="nav-link text-white {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a href="{% url 'admin_products' %}"
             class="nav-link text-white {% if request.resolver_match.url_name == 'admin_products' %}active{% endif %}">
            <i class="bi bi-box-seam me-2"></i> Products
          </a>
        </li>

        <!-- <li class="nav-item">
          <a href="{% url 'add_product' %}"
             class="nav-link text-white {% if request.resolver_match.url_name == 'add_product' %}active{% endif %}">
            <i class="bi bi-plus-circle me-2"></i> Add Product
          </a>
        </li> -->

        <li class="nav-item">
          <a href="{% url 'admin_categories' %}"
             class="nav-link text-white {% if request.resolver_match.url_name == 'admin_categories' %}active{% endif %}">
            <i class="bi bi-tags me-2"></i> Categories
          </a>
        </li>

        <li class="nav-item">
          <a href="{% url 'admin_personal_details' %}"
             class="nav-link text-white {% if request.resolver_match.url_name == 'admin_personal_details' %}active{% endif %}">
            <i class="bi bi-person me-2"></i> Personal Details
          </a>
        </li>

        <li class="nav-item mt-3">
          <a href="{% url 'admin_logout' %}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-right me-2"></i> Logout
          </a>
        </li>

      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-4">
      {% block content %}
      {% endblock %}
    </main>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
